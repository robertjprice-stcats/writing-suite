  const CB_STORAGE_KEY = 'writingsuite_corkboard_v1';

  function loadCorkboardState() {
    try {
      const raw = localStorage.getItem(CB_STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }
  function saveCorkboardState(state) {
    try {
      localStorage.setItem(CB_STORAGE_KEY, JSON.stringify(state));
    } catch (e) { console.warn('Corkboard save failed:', e); }
  }

  appByName.corkboard = {
    title: 'Corkboard',
    mount(body, paneEl, paneId) {
      const tpl = $('#corkboardTemplate');
      body.appendChild(tpl.content.cloneNode(true));
      const root = body.querySelector('.cb-root');

      const board = root.querySelector('.cb-board');
      const lanesEl = root.querySelector('.cb-lanes');
      const sidebar = root.querySelector('.cb-sidebar');
      const sidebarContent = root.querySelector('.cb-sidebar-content');
      const structureSelect = root.querySelector('.cb-structure-select');
      const toggleLanesBtn = root.querySelector('.cb-toggle-lanes');
      const toggleSidebarBtn = root.querySelector('.cb-toggle-sidebar');
      const cardCountEl = root.querySelector('.cb-card-count');
      const stage = root.querySelector('.cb-stage');

      // Default state
      const persisted = loadCorkboardState();
      const state = persisted || {
        cards: [],
        structure: 'none',
        lanesOn: false,
        sidebarOn: false,
        customStructures: {},
        scroll: { x: 0, y: 0 },
      };

      // Save (debounced)
      let saveTimer = null;
      function persist() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveCorkboardState(state), 200);
      }

      // ---- structure dropdown ----
      function rebuildStructureSelect() {
        structureSelect.innerHTML = '';
        for (const [key, def] of Object.entries(STRUCTURES)) {
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = def.name;
          structureSelect.appendChild(opt);
        }
        // custom structures
        for (const [key, def] of Object.entries(state.customStructures)) {
          const opt = document.createElement('option');
          opt.value = 'custom:' + key;
          opt.textContent = '★ ' + def.name;
          structureSelect.appendChild(opt);
        }
        // create new
        const opt = document.createElement('option');
        opt.value = '__new__';
        opt.textContent = '+ New custom…';
        structureSelect.appendChild(opt);

        structureSelect.value = state.structure;
      }
      rebuildStructureSelect();

      function getStructure() {
        if (state.structure.startsWith('custom:')) {
          const key = state.structure.slice(7);
          return state.customStructures[key] || STRUCTURES.none;
        }
        return STRUCTURES[state.structure] || STRUCTURES.none;
      }

      structureSelect.addEventListener('change', () => {
        if (structureSelect.value === '__new__') {
          structureSelect.value = state.structure;
          openCustomStructureModal();
          return;
        }
        state.structure = structureSelect.value;
        renderLanes();
        renderSidebar();
        persist();
      });

      // ---- lanes ----
      function renderLanes() {
        lanesEl.innerHTML = '';
        const struct = getStructure();
        if (!struct.beats.length) {
          lanesEl.classList.add('hidden');
          return;
        }
        struct.beats.forEach((beat, i) => {
          const lane = document.createElement('div');
          lane.className = 'cb-lane';
          lane.innerHTML = `<span class="cb-lane-label">${i + 1}. ${escapeHTML(beat.name)}</span>`;
          lanesEl.appendChild(lane);
        });
        lanesEl.classList.toggle('hidden', !state.lanesOn);
      }

      function escapeHTML(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }

      // ---- sidebar ----
      function renderSidebar() {
        const struct = getStructure();
        sidebarContent.innerHTML = '';
        if (!struct.beats.length) {
          sidebarContent.innerHTML = '<p style="font-style:italic;color:var(--ink-soft);font-size:0.85rem;">No structure selected.</p>';
        } else {
          struct.beats.forEach((beat, i) => {
            const div = document.createElement('div');
            div.className = 'beat';
            div.innerHTML = `<span class="num">${i + 1}.</span><span class="name">${escapeHTML(beat.name)}</span><span class="desc">${escapeHTML(beat.desc || '')}</span>`;
            sidebarContent.appendChild(div);
          });
        }
        sidebar.classList.toggle('hidden', !state.sidebarOn);
      }

      toggleLanesBtn.addEventListener('click', () => {
        state.lanesOn = !state.lanesOn;
        toggleLanesBtn.classList.toggle('active', state.lanesOn);
        renderLanes();
        persist();
      });
      toggleSidebarBtn.addEventListener('click', () => {
        state.sidebarOn = !state.sidebarOn;
        toggleSidebarBtn.classList.toggle('active', state.sidebarOn);
        renderSidebar();
        persist();
      });

      // restore toggle states
      toggleLanesBtn.classList.toggle('active', state.lanesOn);
      toggleSidebarBtn.classList.toggle('active', state.sidebarOn);
      renderLanes();
      renderSidebar();

      // ---- cards ----
      function makeCard(card) {
        const el = document.createElement('div');
        el.className = 'cb-card';
        el.dataset.id = card.id;
        el.dataset.color = card.color || 'yellow';
        el.style.left = card.x + 'px';
        el.style.top = card.y + 'px';
        el.innerHTML = `
          <div class="cb-card-toolbar">
            <button class="cb-card-color" title="Change colour">●</button>
            <button class="cb-card-delete" title="Delete">×</button>
          </div>
          <div class="cb-color-picker">
            ${['yellow','pink','blue','green','orange','purple'].map(c =>
              `<div class="cb-color-swatch" data-color="${c}" style="background:var(--note-${c})"></div>`
            ).join('')}
          </div>
          <div class="cb-card-text" contenteditable="true" spellcheck="true"></div>
        `;
        const textEl = el.querySelector('.cb-card-text');
        textEl.textContent = card.text || '';
        if (!card.text) textEl.classList.add('empty');

        // edit
        textEl.addEventListener('input', () => {
          card.text = textEl.textContent;
          textEl.classList.toggle('empty', !card.text);
          persist();
        });
        textEl.addEventListener('focus', () => textEl.classList.remove('empty'));
        textEl.addEventListener('blur', () => {
          textEl.classList.toggle('empty', !textEl.textContent);
        });

        // delete
        el.querySelector('.cb-card-delete').addEventListener('click', async () => {
          if (card.text && card.text.trim().length > 20) {
            const ok = await customConfirm('Delete this card?', { dangerLabel: 'Delete' });
            if (!ok) return;
          }
          state.cards = state.cards.filter(c => c.id !== card.id);
          el.remove();
          updateCardCount();
          persist();
        });

        // color picker toggle
        el.querySelector('.cb-card-color').addEventListener('click', (e) => {
          e.stopPropagation();
          el.classList.toggle('color-open');
        });
        el.querySelectorAll('.cb-color-swatch').forEach(sw => {
          sw.addEventListener('click', (e) => {
            e.stopPropagation();
            const c = sw.dataset.color;
            card.color = c;
            el.dataset.color = c;
            el.classList.remove('color-open');
            persist();
          });
        });

        // drag — only when grabbing card body, not when editing text
        let dragState = null;
        el.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('cb-card-text')) return;
          if (e.target.closest('.cb-card-toolbar') || e.target.closest('.cb-color-picker')) return;
          e.preventDefault();
          el.classList.add('dragging');
          const rect = el.getBoundingClientRect();
          dragState = {
            offX: e.clientX - rect.left,
            offY: e.clientY - rect.top,
          };
          const onMove = (ev) => {
            if (!dragState) return;
            const stageRect = stage.getBoundingClientRect();
            const x = ev.clientX - stageRect.left + stage.scrollLeft - dragState.offX;
            const y = ev.clientY - stageRect.top + stage.scrollTop - dragState.offY;
            const cx = Math.max(0, Math.min(board.offsetWidth - el.offsetWidth, x));
            const cy = Math.max(0, Math.min(board.offsetHeight - el.offsetHeight, y));
            el.style.left = cx + 'px';
            el.style.top = cy + 'px';
            card.x = cx;
            card.y = cy;
          };
          const onUp = () => {
            el.classList.remove('dragging');
            dragState = null;
            persist();
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        return el;
      }

      function addCard(opts = {}) {
        const card = {
          id: uid(),
          x: opts.x ?? (200 + state.cards.length * 20) % 1000 + 50,
          y: opts.y ?? (120 + state.cards.length * 20) % 600 + 60,
          text: opts.text || '',
          color: opts.color || 'yellow',
        };
        state.cards.push(card);
        board.appendChild(makeCard(card));
        updateCardCount();
        persist();
        return card;
      }

      function updateCardCount() {
        const n = state.cards.length;
        cardCountEl.textContent = `${n} card${n === 1 ? '' : 's'}`;
      }

      // restore cards
      state.cards.forEach(c => board.appendChild(makeCard(c)));
      updateCardCount();

      // double-click empty board to add
      stage.addEventListener('dblclick', (e) => {
        if (e.target !== stage && e.target !== board && !e.target.classList.contains('cb-lane')) return;
        const stageRect = stage.getBoundingClientRect();
        const x = e.clientX - stageRect.left + stage.scrollLeft - 70;
        const y = e.clientY - stageRect.top + stage.scrollTop - 30;
        const card = addCard({ x, y });
        // focus the new card
        const el = board.querySelector(`.cb-card[data-id="${card.id}"] .cb-card-text`);
        if (el) el.focus();
      });

      // close color picker on outside click
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.cb-card')) {
          $$('.cb-card.color-open', root).forEach(c => c.classList.remove('color-open'));
        }
      });

      // toolbar buttons
      root.querySelector('.cb-add-card').addEventListener('click', () => {
        const stageRect = stage.getBoundingClientRect();
        const x = stage.scrollLeft + stageRect.width / 2 - 70;
        const y = stage.scrollTop + 100;
        const card = addCard({ x, y });
        const el = board.querySelector(`.cb-card[data-id="${card.id}"] .cb-card-text`);
        if (el) el.focus();
      });

      root.querySelector('.cb-clear').addEventListener('click', async () => {
        if (state.cards.length === 0) return;
        const ok = await customConfirm(`Remove all ${state.cards.length} card${state.cards.length === 1 ? '' : 's'}? This cannot be undone.`, { dangerLabel: 'Clear all' });
        if (!ok) return;
        state.cards = [];
        $$('.cb-card', board).forEach(c => c.remove());
        updateCardCount();
        persist();
      });

      // ---- custom structure modal ----
      function openCustomStructureModal(existingKey = null) {
        const existing = existingKey ? state.customStructures[existingKey] : null;
        const modal = document.createElement('div');
        modal.className = 'cb-modal';
        modal.innerHTML = `
          <div class="cb-modal-card">
            <h3>${existing ? 'Edit' : 'Create'} custom structure</h3>
            <div class="form-row">
              <label>Name</label>
              <input type="text" class="cs-name" placeholder="e.g. My Essay Plan" />
            </div>
            <div class="form-row">
              <label>Beats / sections</label>
              <textarea class="cs-beats" placeholder="One per line. Format:&#10;Beat name :: Optional description&#10;&#10;Example:&#10;Hook :: Open with a striking image or question&#10;Thesis :: State your argument clearly&#10;Evidence :: Provide your strongest support"></textarea>
              <div class="hint">One beat per line. Use "Name :: description" to add a description.</div>
            </div>
            <div class="cb-modal-actions">
              <button class="cs-cancel">Cancel</button>
              ${existing ? '<button class="cs-delete" style="background:#fdecec;border-color:var(--accent-dangerous);color:#7a1818">Delete</button>' : ''}
              <button class="primary cs-save">Save</button>
            </div>
          </div>`;
        document.body.appendChild(modal);

        const nameInput = modal.querySelector('.cs-name');
        const beatsInput = modal.querySelector('.cs-beats');
        if (existing) {
          nameInput.value = existing.name;
          beatsInput.value = existing.beats.map(b => b.desc ? `${b.name} :: ${b.desc}` : b.name).join('\n');
        }
        nameInput.focus();

        modal.querySelector('.cs-cancel').addEventListener('click', () => modal.remove());
        modal.querySelector('.cs-save').addEventListener('click', () => {
          const name = nameInput.value.trim();
          const lines = beatsInput.value.split('\n').map(l => l.trim()).filter(Boolean);
          if (!name) { nameInput.focus(); return; }
          if (lines.length === 0) { beatsInput.focus(); return; }
          const beats = lines.map(l => {
            const idx = l.indexOf('::');
            if (idx === -1) return { name: l, desc: '' };
            return { name: l.slice(0, idx).trim(), desc: l.slice(idx + 2).trim() };
          });
          const key = existingKey || uid();
          state.customStructures[key] = { name, beats };
          state.structure = 'custom:' + key;
          persist();
          rebuildStructureSelect();
          renderLanes();
          renderSidebar();
          modal.remove();
        });
        if (existing) {
          modal.querySelector('.cs-delete').addEventListener('click', async () => {
            const ok = await customConfirm(`Delete "${existing.name}"?`, { dangerLabel: 'Delete' });
            if (!ok) return;
            delete state.customStructures[existingKey];
            if (state.structure === 'custom:' + existingKey) state.structure = 'none';
            persist();
            rebuildStructureSelect();
            renderLanes();
            renderSidebar();
            modal.remove();
          });
        }
      }

      // Allow editing custom structure: when one is selected, show an edit affordance
      // (simple: add an "Edit structure" button when a custom structure is active)
      const editStructBtn = document.createElement('button');
      editStructBtn.textContent = 'Edit';
      editStructBtn.style.display = 'none';
      editStructBtn.title = 'Edit this custom structure';
      structureSelect.parentElement.insertBefore(editStructBtn, toggleLanesBtn);
      function refreshEditButton() {
        editStructBtn.style.display = state.structure.startsWith('custom:') ? '' : 'none';
      }
      refreshEditButton();
      structureSelect.addEventListener('change', refreshEditButton);
      editStructBtn.addEventListener('click', () => {
        if (state.structure.startsWith('custom:')) {
          openCustomStructureModal(state.structure.slice(7));
        }
      });

      // restore scroll
      requestAnimationFrame(() => {
        if (state.scroll) {
          stage.scrollLeft = state.scroll.x || 0;
          stage.scrollTop = state.scroll.y || 0;
        }
      });
      stage.addEventListener('scroll', () => {
        state.scroll = { x: stage.scrollLeft, y: stage.scrollTop };
        persist();
      });

      return {
        cleanup() {
          clearTimeout(saveTimer);
          saveCorkboardState(state);
        }
      };
    },
    unmount(instance) { instance.cleanup(); }
  };

  /* =================================================
     WELCOME / BOOT
     ================================================= */

  const welcomeEl = $('#welcome');
  const workspaceEl = $('#workspace');

  function showWelcome() {
    workspaceEl.classList.add('hidden');
    welcomeEl.classList.remove('hidden');
  }
  function showWorkspace() {
    welcomeEl.classList.add('hidden');
    workspaceEl.classList.remove('hidden');
  }

  // Welcome cards
  $$('.welcome-card').forEach(card => {
    card.addEventListener('click', () => {
      const app = card.dataset.app;
      showWorkspace();
      openApp(app);
    });
  });

  // Suite-bar launchers
  $$('.launcher-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const app = btn.dataset.app;
      // If already open, close it; otherwise open.
      const existing = [...panesById.values()].find(p => p.app === app);
      if (existing) closePane(existing.id);
      else openApp(app);
    });
  });

  // Brand → welcome (only when nothing critical going on)
  $('#brandBtn').addEventListener('click', async () => {
    if (panesById.size > 0) {
      const ok = await customConfirm('Return to the welcome screen? Open panes will be closed.', { dangerLabel: 'Return' });
      if (!ok) return;
      // Close all panes
      [...panesById.keys()].forEach(id => closePane(id));
    }
    showWelcome();
  });

</script>
</body>
</html>
